---
# ============================================================================
# Role    : common
# File    : aliases.yml
# Purpose : Deploy enterprise bash aliases
# Author  : Rajasekhar Miriyala
# ============================================================================

- name: Deploy bash aliases
  ansible.builtin.template:
    src: bash_aliases.j2
    dest: /etc/profile.d/bash_aliases.sh
    owner: root
    group: root
    mode: '0644'

- name: Display alias deployment status
  ansible.builtin.debug:
    msg: "Enterprise bash aliases deployed successfully."